# Render Blueprint — deploys backend (web service) and frontend (static SPA).
# Secrets and cross-service URLs are marked `sync: false` and filled in the
# Render dashboard after the first deploy (when the URLs are known).
services:
  # ---------------- Backend (NestJS) ----------------
  - type: web
    name: realtime-ai-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SWAPI_BASE_URL
        value: https://www.swapi.tech/api

  # ---------------- Frontend (Nuxt 3 SPA, static) ----------------
  - type: web
    name: realtime-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci --include=dev && npm run generate
    staticPublishPath: .output/public
    # SPA fallback: every route serves index.html (client-side routing)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NUXT_PUBLIC_API_BASE
        sync: false
